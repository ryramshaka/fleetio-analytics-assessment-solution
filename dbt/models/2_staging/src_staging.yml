version: 2

models:
  - name: stg_fleetio_accounts
    description: "Cleaned account records with standardized 'account_' prefixing."
    columns:
      - name: account_id
        tests: [unique, not_null]
      - name: account_company_cd
      - name: account_primary_contact_id
      - name: account_country_cd
      - name: account_state_cd
      - name: account_city_cd
      - name: account_industry_cd
      - name: account_fleet_size_cd

  - name: stg_fleetio_contacts
    description: "Cleaned and casted contact records from Fleetio."
    columns:
      - name: contact_id
        description: "The unique identifier for the contact (UUID)."
        tests:
          - unique
          - not_null
      - name: contact_account_id
        description: "Foreign key to the accounts table."
      - name: contact_lead_id
        description: "Foreign key to the leads table (null if the contact did not originate as a lead)."
      - name: contact_first_name_cd
        description: "Contact's first name."
      - name: contact_last_name_cd
        description: "Contact's last name."
      - name: contact_job_title_cd
        description: "Professional title as recorded in Fleetio."
      - name: contact_email_cd
        description: "The primary email address for this contact."
        tests:
          - not_null
      - name: contact_created_at_ts
        description: "The timestamp when this contact record was created."

  - name: stg_fleetio_leads
    description: "Cleaned and prefixed lead records from Fleetio. All columns are prefixed with 'lead_' to avoid collisions in downstream joins."
    columns:
      - name: lead_id
        description: "Primary key for the lead (UUID)."
        tests:
          - unique
          - not_null

      - name: lead_first_name_cd
      - name: lead_last_name_cd
      - name: lead_job_title_cd
      - name: lead_email_cd
        tests:
          - not_null
      - name: lead_company_name_cd

      - name: lead_created_at_ts
        description: "Timestamp when the lead record was first created."
      - name: lead_converted_at_ts
        description: "Timestamp when the lead was converted to an account/contact. Null if not yet converted."

      - name: lead_source_cd
      - name: lead_country_cd
      - name: lead_city_cd
      - name: lead_state_cd
      - name: lead_industry_cd
      - name: lead_fleet_size_bracket_cd

  - name: stg_fleetio_opportunities
    description: "Cleaned opportunity records. Tracks the sales pipeline, including win/loss status and geography."
    columns:
      - name: opportunity_id
        description: "Primary key for the opportunity (UUID)."
        tests:
          - unique
          - not_null
      - name: opportunity_account_id
        description: "Foreign key to the associated account."
      - name: opportunity_created_at_ts
        description: "The date and time the opportunity was opened."
      - name: opportunity_closed_at_ts
        description: "The date and time the opportunity reached a terminal state (Won/Lost)."
      - name: is_closed_flag
        description: "Boolean indicating if the opportunity is no longer active."
      - name: is_won_flag
        description: "Boolean indicating if the opportunity resulted in a successful sale."
      - name: opportunity_country_cd
      - name: opportunity_state_cd
      - name: opportunity_city_cd