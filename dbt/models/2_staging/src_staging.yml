version: 2

models:
  - name: stg_fleetio_contacts
    description: "Cleaned and casted contact records from Fleetio."
    columns:
      - name: contact_id
        description: "The unique identifier for the contact (UUID)."
        tests:
          - unique
          - not_null
      - name: account_id
        description: "Foreign key to the accounts table."
      - name: lead_id
        description: "Foreign key to the leads table (null if the contact did not originate as a lead)."
      - name: first_name
        description: "Contact's first name."
      - name: last_name
        description: "Contact's last name."
      - name: job_title
        description: "Professional title as recorded in Fleetio."
      - name: contact_email
        description: "The primary email address for this contact."
        tests:
          - not_null
      - name: created_at_ts
        description: "The timestamp when this contact record was created."

  - name: stg_fleetio_leads
    description: "Cleaned and prefixed lead records from Fleetio. All columns are prefixed with 'lead_' to avoid collisions in downstream joins."
    columns:
      - name: lead_id
        description: "Primary key for the lead (UUID)."
        tests:
          - unique
          - not_null

      - name: lead_first_name
      - name: lead_last_name
      - name: lead_job_title
      - name: lead_email
        tests:
          - not_null
      - name: lead_company_name

      - name: lead_created_at_ts
        description: "Timestamp when the lead record was first created."
      - name: lead_converted_at_ts
        description: "Timestamp when the lead was converted to an account/contact. Null if not yet converted."

      - name: lead_source_cd
      - name: lead_country_cd
      - name: lead_city_cd
      - name: lead_state_cd
      - name: lead_industry_cd
      - name: lead_fleet_size_bracket_cd