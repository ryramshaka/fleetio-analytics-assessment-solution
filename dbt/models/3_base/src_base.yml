version: 2

models:
  - name: base_leads
    description: "Base layer for leads. Contains raw marketing funnel entry points with 'lead_' prefixing."
    columns:
      - name: lead_id
        tests: [unique, not_null]
      - name: lead_first_name_cd
      - name: lead_last_name_cd
      - name: lead_email_cd
      - name: lead_created_at_ts
      - name: lead_converted_at_ts
      - name: lead_source_cd
      - name: lead_industry_cd
      - name: lead_fleet_size_cd

  - name: base_accounts
    description: "Base layer for accounts. Represents converted companies."
    columns:
      - name: account_id
        tests: [unique, not_null]
      - name: account_company_cd
      - name: account_primary_contact_id
      - name: account_industry_cd
      - name: account_fleet_size_cd
      - name: account_country_cd

  - name: base_contacts
    description: "Base layer for contacts. Represents individuals associated with an account and a lead."
    columns:
      - name: contact_id
        tests: [unique, not_null]
      - name: contact_account_id
      - name: contact_lead_id
      - name: contact_first_name_cd
      - name: contact_last_name_cd
      - name: contact_email_cd
      - name: contact_created_at_ts

  - name: base_opportunities
    description: "Base layer for opportunities. Tracks the sales pipeline and win/loss status."
    columns:
      - name: opportunity_id
        tests: [unique, not_null]
      - name: opportunity_account_id
      - name: opportunity_created_at_ts
      - name: opportunity_closed_at_ts
      - name: opportunity_is_closed_flag
      - name: opportunity_is_won_flag
      - name: opportunity_country_cd